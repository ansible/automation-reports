name: "Check Derived Files"

on:
    push:
        branches: [main]
        paths:
            - "requirements-pinned.txt"
            - "requirements-build.txt"
            - "requirements-build-tools.txt"
            - "licenses/licenses.md"
    pull_request:
        paths:
            - "requirements-pinned.txt"
            - "requirements-build.txt"
            - "requirements-build-tools.txt"
            - "licenses/licenses.md"

permissions:
  contents: write
  pull-requests: write

jobs:
    check-derived-files:
        runs-on: ubuntu-latest

        steps:
            - name: "Checkout automation-reports (${{ github.ref }})"
              uses: actions/checkout@v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: "Set up Python"
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: "Install podman"
              run: |
                  sudo apt-get update
                  sudo apt-get install -y podman

            - name: "Sync all requirements files"
              run: make requirements

            - name: "Sync licenses"
              run: make licenses

            - name: "Check for changes"
              id: changes
              run: |
                  if ! git diff --quiet requirements-build.txt requirements-build-tools.txt licenses/licenses.md; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "Derived files have been updated"
                    git diff --stat requirements-build.txt requirements-build-tools.txt licenses/licenses.md
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                    echo "All derived files are up to date"
                  fi

            - name: "Commit and push changes"
              if: steps.changes.outputs.changed == 'true' && github.event_name == 'push'
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add requirements-build.txt requirements-build-tools.txt licenses/licenses.md
                  git commit -m "Auto-sync derived files from requirements-pinned.txt"
                  git push

            - name: "Add PR comment for changes"
              if: steps.changes.outputs.changed == 'true' && github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: '**Derived files need to be updated**\n\nThe `requirements-pinned.txt` or `requirements-build.txt` has changed but derived files are not in sync.\n\nPlease run:\n```bash\nmake requirements\nmake licenses\n```\nThen commit the updated files:\n- `requirements-build.txt`\n- `requirements-build-tools.txt`\n- `licenses/licenses.md`'
                      })

            - name: "Fail if derived files out of sync in PR"
              if: steps.changes.outputs.changed == 'true' && github.event_name == 'pull_request'
              run: |
                  echo "Derived files are out of sync. Please run 'make requirements' and 'make licenses' locally."
                  git diff requirements-build.txt requirements-build-tools.txt licenses/licenses.md
                  exit 1
