name: Build installer

# This workflow builds online and bundled installers for Ansible Automation Dashboard.
# The bundled installer includes the automation dashboard image pulled from "some" container registry, and is used for disconnected installations.
# The online installer does not include any images, and pulls the automation dashboard image from the registry at install time, and is used for connected installations.

# Required GHA setup:
# GHA variables:
#  - REGISTRY_REDHAT_IO_USERNAME
#  - REGISTRY_STAGE_REDHAT_IO_USERNAME
#  - REGISTRY_QUAY_IO_USERNAME
# GHA secrets:
#  - REGISTRY_REDHAT_IO_PASSWORD
#  - REGISTRY_STAGE_REDHAT_IO_PASSWORD
#  - REGISTRY_QUAY_IO_PASSWORD

on:
  push:
  #   # tags:
  #   #   - 'v*.*.*'
    branches:
      - release-*
  workflow_dispatch:
    inputs:
      AAP_DASHBOARD_IMAGE:
        description: 'Automation Dashboard image to use. Possible values: registry.redhat.io/ansible-automation-platform/automation-dashboard-rhel9:latest, registry.stage.redhat.io/ansible-automation-platform/automation-dashboard-rhel9:latest, quay.io/aap/automation-dashboard:'
        required: false
        default: 'registry.redhat.io/ansible-automation-platform/automation-dashboard-rhel9:latest'
        type: string

permissions:
  contents: read

env:
  SELECTED_AAP_DASHBOARD_IMAGE: ${{ inputs.AAP_DASHBOARD_IMAGE || 'registry.redhat.io/ansible-automation-platform/automation-dashboard-rhel9:latest' }}

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from branch name
        id: extract
        # For release-x.y branches this strips the prefix to get "x.y".
        # For other branches (e.g. workflow_dispatch on a feature branch)
        # the full branch name is used as-is, which is fine for testing.
        run: |
          VERSION="${GITHUB_REF_NAME#release-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION (from branch: $GITHUB_REF_NAME)"

  bundled-installer:
    needs: set-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.set-version.outputs.version }}
    strategy:
      matrix:
        include:
          - installer_arch: x86_64
          - installer_arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Log in to container registries
        run: |
          podman login -u "${{ vars.REGISTRY_REDHAT_IO_USERNAME }}" -p "${{ secrets.REGISTRY_REDHAT_IO_PASSWORD }}" registry.redhat.io
          podman login -u "${{ vars.REGISTRY_STAGE_REDHAT_IO_USERNAME }}" -p "${{ secrets.REGISTRY_STAGE_REDHAT_IO_PASSWORD }}" registry.stage.redhat.io
          podman login -u "${{ vars.REGISTRY_QUAY_IO_USERNAME }}" -p "${{ secrets.REGISTRY_QUAY_IO_PASSWORD }}" quay.io
      - name: Prepare inventory for offline installer build
        run: |
          REGISTRY_URL_AAP_AUTOMATION_DASHBOARD=$(echo "${{ env.SELECTED_AAP_DASHBOARD_IMAGE }}" | cut -d'/' -f1)
          if [[ "$REGISTRY_URL_AAP_AUTOMATION_DASHBOARD" == "quay.io" ]]; then
            dashboard_image_registry_username="${{ vars.REGISTRY_QUAY_IO_USERNAME }}"
            dashboard_image_registry_password="${{ secrets.REGISTRY_QUAY_IO_PASSWORD }}"
          elif [[ "$REGISTRY_URL_AAP_AUTOMATION_DASHBOARD" == "registry.stage.redhat.io" ]]; then
            dashboard_image_registry_username="${{ vars.REGISTRY_STAGE_REDHAT_IO_USERNAME }}"
            dashboard_image_registry_password="${{ secrets.REGISTRY_STAGE_REDHAT_IO_PASSWORD }}"
          elif [[ "$REGISTRY_URL_AAP_AUTOMATION_DASHBOARD" == "registry.redhat.io" ]]; then
            dashboard_image_registry_username="${{ vars.REGISTRY_REDHAT_IO_USERNAME }}"
            dashboard_image_registry_password="${{ secrets.REGISTRY_REDHAT_IO_PASSWORD }}"
          else
            echo "Error: Unsupported registry URL: $REGISTRY_URL_AAP_AUTOMATION_DASHBOARD"
            exit 1
          fi

          cat <<EOF >setup/inventory
          [automationdashboard]
          host.example.com ansible_connection=local
          [all:vars]
          registry_username=${{ vars.REGISTRY_REDHAT_IO_USERNAME }}
          registry_password=${{ secrets.REGISTRY_REDHAT_IO_PASSWORD }}
          registry_username_aap_automation_dashboard=$dashboard_image_registry_username
          registry_password_aap_automation_dashboard=$dashboard_image_registry_password
          bundle_install=true
          bundle_dir=$PWD/setup/bundle
          EOF
      - name: Print build configuration
        run: |
          echo "Build configuration:"
          echo "  AAP_DASHBOARD_IMAGE: ${{ env.SELECTED_AAP_DASHBOARD_IMAGE }}"
          echo "  INSTALLER_ARCH: ${{ matrix.installer_arch }}"
          echo "  VERSION: $VERSION"
          echo "  Branch: $GITHUB_REF_NAME"
          echo "  Bundled installer: yes"
      - name: Build bundled installer
        run: >
          AAP_DASHBOARD_BUNDLED_INSTALLER=1
          USE_LOCAL_AUTOMATION_DASHBOARD_IMAGE=0
          AAP_DASHBOARD_IMAGE=${{ env.SELECTED_AAP_DASHBOARD_IMAGE }}
          INSTALLER_ARCH=${{ matrix.installer_arch }}
          INSTALLER_FILE="bundle/ansible-automation-dashboard-containerized-setup-bundle-${VERSION}-${{ matrix.installer_arch }}.tar.gz"
          setup/build_installer.sh
      - name: Upload bundled installer
        uses: actions/upload-artifact@v7
        with:
          name: bundled-installer-${{ matrix.installer_arch }}
          path: setup/bundle/ansible-automation-dashboard-containerized-setup-bundle-${{ needs.set-version.outputs.version }}-${{ matrix.installer_arch }}.tar.gz
          retention-days: 1

  online-installer:
    needs: set-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.set-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Print build configuration
        run: |
          echo "Build configuration:"
          echo "  VERSION: $VERSION"
          echo "  Branch: $GITHUB_REF_NAME"
          echo "  Bundled installer: no"
      - name: Prepare inventory for online installer build
        run: |
          cat <<EOF >setup/inventory
          [automationdashboard]
          host.example.com ansible_connection=local
          [all:vars]
          bundle_install=false
          EOF
      - name: Build online installer
        run: >
          AAP_DASHBOARD_BUNDLED_INSTALLER=0
          INSTALLER_FILE="bundle/ansible-automation-dashboard-containerized-setup-${VERSION}.tar.gz"
          setup/build_installer.sh
      - name: Create per-arch copies
        run: |
          cd setup/bundle
          BASE="ansible-automation-dashboard-containerized-setup-${VERSION}"
          cp "${BASE}.tar.gz" "${BASE}-x86_64.tar.gz"
          mv "${BASE}.tar.gz" "${BASE}-aarch64.tar.gz"
      - name: Upload online installers
        uses: actions/upload-artifact@v7
        with:
          name: online-installers
          path: |
            setup/bundle/ansible-automation-dashboard-containerized-setup-${{ needs.set-version.outputs.version }}-x86_64.tar.gz
            setup/bundle/ansible-automation-dashboard-containerized-setup-${{ needs.set-version.outputs.version }}-aarch64.tar.gz
          retention-days: 1

  collect-installers:
    needs: [set-version, bundled-installer, online-installer]
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: '{bundled-installer-*,online-installers}'
          merge-multiple: true
      - name: Print checksums
        run: sha256sum *.tar.gz
      - name: Upload combined installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ansible-automation-dashboard-containerized-installers-${{ needs.set-version.outputs.version }}
          path: '*.tar.gz'
          retention-days: 31
