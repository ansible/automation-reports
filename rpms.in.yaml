packages: [
  # Runtime packages (Stage 3 final image)
  findutils,
  glibc-langpack-en,
  libjpeg-turbo,
  libpq,
  nginx,
  pango,
  python3.12,
  # Build packages (Stage 2 python-builder)
  cargo,
  gcc,
  gcc-c++,
  libffi-devel,
  libjpeg-turbo-devel,
  libpq-devel,
  openssl-devel,
  python3.12-devel,
  python3.12-pip,
  rust,
  zlib-devel,
]
contentOrigin:
  repofiles: ["./ubi.repo"]
arches: [x86_64, aarch64]
installWeakDeps: false
# Use public UBI image only (schema does not allow context.image + context.containerfile together)
context:
  image: registry.access.redhat.com/ubi9/ubi-minimal:latest
